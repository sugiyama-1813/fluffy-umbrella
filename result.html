<!DOCTYPE html>
<html lang="ja">
  <head> 
  <meta charset="UTF-8"> 
  <title>結果</title>
  <link rel="stylesheet" href="style.css"> 
  </head> 
  
  <body>
    <div class="container">
      <h1>犯人はだれ？</h1> 
      <img src="images/warumono.png" width="350" alt=犯人> 
      <button onclick="answer('先生')"> 先生</button> 
      <button onclick="answer('生徒')"> 生徒</button> 
      <button onclick="answer('校長先生')">校長先生</button> 
    
      <hr>
      
      <h2 id="result"></h2>
      
      <p id="message"></p>

      <a href="index.html">
        <button id="restart" style="display:none;">
          もう一度選択する
        </button>
      </a>
      
    </div>
    <script>
      function answer(name){
        let score = 0;
        if(memo) score++;
        if(key) score++;
        if(evidence) score++;

        let rank = "";

        if(score == 3){
          rank = "S";
        }
        else if(score == 2){
          rank = "B";
        }
        else if(score == 1){
          rank = "C";
        }
        else{
          rank = "D";
        }
        if(name === "生徒"){
          document.getElementById("result").innerHTML="GAME CLEAR!!";
          document.getElementById("message").innerHTML=
            "<h2>おめでとう!</h2>"+
            "<p>卒業証書を取り返した!!</P>"+
            "<hr>"+
            "<p>メモ：取得済み</p>"+
            "<p>鍵：取得済み</p>"+
            "<p>証拠：取得済み</p>"+
            "<p>探偵度：<b>" + rank + "</b></p>";
   }
   else{
      document.getElementById("result").innerHTML="証拠不足";
      document.getElementById("message").innerHTML="生徒を疑ったが、決定的な証拠が足りなかった...。";
                                                        "探偵度：<b>" + rank + "</b>"; 
   }
}
      
else{
    document.getElementById("result").innerHTML="GAME OVER";
    document.getElementById("message").innerHTML="犯人ではなかった....。<br>もう一度挑戦しよう!<br>" + 
                                                 "探偵度：<b>" + rank + "</b>";   
    }
      
        document.getElementById("result").style.display="inline-block";
      }
    </script>
  </body>
</html>
