<!DOCTYPE html>
<html lang="ja">
  <head> 
  <meta charset="UTF-8"> 
  <title>結果</title>
  <link rel="stylesheet" herf="style.css"> 
  </head> 
  
  <body>
    <div class="box">
      <h1>犯人はだれ？</h1> 
      <img src="images/classroom.jpg" width="350"> 
      <button onclick="answer('先生')"> 先生</button> 
      <button onclick="answer('生徒')"> 生徒</button> 
      <button onclick="answer('校長先生')">校長先生</button> 
      
      <p id="message"></p>

    </div>
    <script>
      function answer(name){
        if(name=="生徒"){
          document.getElementById("message").innerHTML="正解！卒業証書を取り返した";
        }
        else{
          document.getElementById("message").innerHTML="不正解！ゲームオーバー";
        }
      }
    </script>
  </body>
</html>
