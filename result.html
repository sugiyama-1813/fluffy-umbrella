<!DOCTYPE html>
<html lang="ja">
  <head> 
  <meta charset="UTF-8"> 
  <title>結果</title>
  <link rel="stylesheet" href="style.css"> 
  </head> 
  
  <body>
    <div class="container">
      <h1>犯人はだれ？</h1> 
      <img src="images/classroom.jpg" width="350"=犯人> 
      <button onclick="answer('先生')"> 先生</button> <br><br>
      <button onclick="answer('生徒')"> 生徒</button> <br><br>
      <button onclick="answer('校長先生')">校長先生</button> 
    
      <hr>
      
      <h2 id="result"></h2>
      
      <p id="message"></p>

      <a href="index.html">
        <button id="restart" style="display:none;">
          もう一度選択する
        </button>
      </a>
      
    </div>
    <script>
      function answer(name){
        if(name === "生徒"){
          document.getElementById("result").innerHTML="GAME CLEAR!!";
          document.getElementById("message").innerHTML="卒業証書を取り返した!!<br>無事に卒業式を迎えられます!!";
        }
        else{
          document.getElementById("result").innerHTML="GAME OVER";
          document.getElementById("message").innerHTML="犯人ではなかった....。<br>もう一度挑戦しよう!";
        }
        document.getElementById("result").style.display="inline";
      }
    </script>
  </body>
</html>
